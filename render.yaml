services:
  - type: web
    name: enterprise-rag-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: .
      - key: POSTGRES_HOST
        sync: false
      - key: POSTGRES_PORT
        sync: false
      - key: POSTGRES_DB
        sync: false
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: POSTGRES_DSN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_MODEL
        sync: false

  - type: static
    name: enterprise-rag-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://enterprise-rag-backend.onrender.com
